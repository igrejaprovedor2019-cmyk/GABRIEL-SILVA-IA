<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL SILVA | ENTERPRISE V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020202; color: #fff; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: #080808; border-right: 1px solid #151515; display: flex; flex-direction: column; }
        #view { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; background: #000; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 14px; animation: in 0.2s ease; }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; }
        .user { background: #2563eb; align-self: flex-end; }
        .t-btn { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #666; transition: 0.2s; border-left: 2px solid transparent; }
        .t-btn.active { background: #111; color: #fff; border-left-color: #2563eb; }
        @keyframes in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <aside class="sidebar p-4">
        <h1 class="font-bold text-xs tracking-widest text-blue-500 mb-6 uppercase">Gabriel Silva AI</h1>
        <button onclick="Core.new()" class="w-full py-2 bg-white text-black rounded-lg text-[10px] font-bold mb-4 hover:bg-blue-500 hover:text-white transition">+ NOVO TÓPICO</button>
        <div id="topics" class="flex-1 overflow-y-auto space-y-1"></div>
        <div class="text-[9px] text-zinc-600 border-t border-zinc-900 pt-4 uppercase tracking-widest">Enterprise v13.0</div>
    </aside>
    <main class="flex-1 flex flex-col">
        <header class="h-14 border-b border-zinc-900 flex items-center px-6 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Sistema Operacional Online</header>
        <div id="view"></div>
        <div class="p-6 bg-gradient-to-t from-black to-transparent">
            <div class="max-w-3xl mx-auto flex gap-3 bg-zinc-900 p-2 rounded-xl border border-zinc-800">
                <input id="in" type="text" placeholder="Comande a IA..." class="bg-transparent flex-1 p-2 outline-none text-sm">
                <button onclick="Core.send()" class="bg-blue-600 w-10 h-10 rounded-lg hover:bg-blue-500 transition"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </main>
    <script>
        const Core = (() => {
            let db = JSON.parse(localStorage.getItem('gs_v13')) || [], cur = localStorage.getItem('gs_id_v13');
            const save = () => { localStorage.setItem('gs_v13', JSON.stringify(db)); localStorage.setItem('gs_id_v13', cur); render(); };
            const render = () => {
                const nav = document.getElementById('topics'); nav.innerHTML = '';
                db.forEach(t => { const d = document.createElement('div'); d.className = `t-btn ${t.id === cur ? 'active' : ''}`; d.innerText = t.name; d.onclick = () => load(t.id); nav.appendChild(d); });
            };
            const load = (id) => {
                cur = id; const v = document.getElementById('view'); v.innerHTML = '';
                const chat = db.find(x => x.id === id); chat.msgs.forEach(m => draw(m.r, m.c, m.i)); save();
            };
            const draw = (r, c, i) => {
                const d = document.createElement('div'); d.className = `msg ${r}`;
                d.innerHTML = i ? `<img src="${c}" class="w-full rounded-lg shadow-xl" onload="document.getElementById('view').scrollTop = 999999">` : c;
                document.getElementById('view').appendChild(d); document.getElementById('view').scrollTop = 999999;
            };
            const send = async () => {
                const i = document.getElementById('in'), v = i.value.trim(); if(!v) return; i.value = '';
                const chat = db.find(x => x.id === cur); if(!chat.msgs.length) chat.name = v.substring(0, 15);
                chat.msgs.push({r:'user', c:v}); draw('user', v);
                if(v.toLowerCase().match(/imagem|foto|desenhe/)) {
                    const u = `https://pollinations.ai/p/${encodeURIComponent(v)}?width=1024&height=1024&seed=${Math.random()}&nologo=true`;
                    chat.msgs.push({r:'ai', c:u, i:true}); draw('ai', u, true);
                } else {
                    const r = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent(v)}`);
                    const t = await r.text(); chat.msgs.push({r:'ai', c:t}); draw('ai', t);
                } save();
            };
            return { new: () => { const id = 'id'+Date.now(); db.unshift({id, name:'Novo Chat', msgs:[]}); cur = id; load(id); }, send, init: () => { if(!db.length) Core.new(); else load(cur || db[0].id); document.getElementById('in').onkeypress = e => e.key==='Enter'&&send(); } };
        })(); Core.init();
    </script>
</body>
</html>
