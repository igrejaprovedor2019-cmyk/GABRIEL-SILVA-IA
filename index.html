<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL SILVA | OS v17 ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; margin: 0; display: flex; overflow: hidden; }
        
        /* Sidebar Profissional */
        .sidebar { width: 280px; background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
        
        /* Área Principal */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; background: #000; }
        
        /* Viewport de Mensagens */
        #view { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
        
        /* Balões de Mensagem */
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 16px; font-size: 14px; line-height: 1.6; animation: slideUp 0.3s ease; word-wrap: break-word; }
        .user { background: #2563eb; align-self: flex-end; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; color: #d1d1d1; }
        .ai b, .ai strong { color: #fff; font-weight: 700; }
        
        /* Tópicos Lateral */
        .t-item { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; color: #666; transition: 0.2s; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
        .t-item:hover { background: #111; color: #fff; }
        .t-item.active { background: #1a1a1a; color: #fff; border-color: #333; font-weight: 600; }

        /* Rodapé de Input Blindado */
        .footer-input { padding: 25px; background: linear-gradient(to top, #000 70%, transparent); z-index: 30; }
        .input-wrapper { background: #0f0f0f; border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; padding: 5px 15px; max-width: 900px; margin: 0 auto; transition: border 0.3s; }
        .input-wrapper:focus-within { border-color: #2563eb; }
        input { background: transparent; border: none; outline: none; color: #fff; flex: 1; padding: 12px; font-size: 14px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        
        img { border-radius: 12px; border: 1px solid #222; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-xl shadow-blue-600/30">
                    <i class="fas fa-terminal text-white text-sm"></i>
                </div>
                <h1 class="font-extrabold text-sm tracking-tight text-white uppercase">Gabriel Silva</h1>
            </div>
            <button onclick="Core.newChat()" class="w-full py-3 bg-white text-black font-black rounded-xl text-[10px] hover:bg-blue-600 hover:text-white transition uppercase tracking-widest shadow-lg">
                + Novo Tópico
            </button>
        </div>
        <nav id="topic-list" class="flex-1 overflow-y-auto px-4"></nav>
        <div class="p-6 border-t border-zinc-900 bg-black/40">
            <span class="text-[9px] font-bold text-zinc-600 uppercase tracking-[0.2em]">Enterprise OS v17</span>
        </div>
    </aside>

    <main class="main-chat">
        <header class="h-16 border-b border-zinc-900 flex items-center justify-between px-8 bg-black/40 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_#2563eb]"></div>
                <span id="active-title" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Console Ativo</span>
            </div>
            <button onclick="Core.deleteChat()" class="text-zinc-700 hover:text-red-500 transition text-xs"><i class="fas fa-trash-alt"></i></button>
        </header>

        <div id="view"></div>

        <footer class="footer-input">
            <div class="input-wrapper">
                <input id="prompt" type="text" placeholder="Digite seu comando ou solicite uma imagem..." autocomplete="off">
                <button onclick="Core.send()" class="w-10 h-10 bg-blue-600 rounded-lg hover:bg-blue-500 transition active:scale-95 flex items-center justify-center">
                    <i class="fas fa-paper-plane text-xs text-white"></i>
                </button>
            </div>
        </footer>
    </main>

    <script>
        const Core = (() => {
            let data = JSON.parse(localStorage.getItem('gs_ultra_17')) || [];
            let activeId = localStorage.getItem('gs_active_17');

            const save = () => {
                localStorage.setItem('gs_ultra_17', JSON.stringify(data));
                localStorage.setItem('gs_active_17', activeId);
                renderTopics();
            };

            const renderTopics = () => {
                const container = document.getElementById('topic-list');
                container.innerHTML = '';
                data.forEach(chat => {
                    const el = document.createElement('div');
                    el.className = `t-item ${chat.id === activeId ? 'active' : ''}`;
                    el.innerHTML = `<i class="far fa-comment-alt mr-2"></i> ${chat.name}`;
                    el.onclick = () => loadChat(chat.id);
                    container.appendChild(el);
                });
            };

            const loadChat = (id) => {
                activeId = id;
                const chat = data.find(x => x.id === id);
                if(!chat) return Core.newChat();

                const view = document.getElementById('view');
                view.innerHTML = '';
                document.getElementById('active-title').innerText = chat.name;
                
                chat.msgs.forEach(m => draw(m.r, m.c, m.i));
                save();
            };

            const draw = (role, content, isImg) => {
                const d = document.createElement('div');
                d.className = `msg ${role}`;
                if(isImg) {
                    d.innerHTML = `<img src="${content}" class="w-full" onload="Core.scroll()">`;
                } else {
                    // marked.parse remove os asteriscos e formata corretamente
                    d.innerHTML = marked.parse(content);
                }
                document.getElementById('view').appendChild(d);
                scroll();
            };

            const scroll = () => {
                const v = document.getElementById('view');
                v.scrollTop = v.scrollHeight;
            };

            const send = async () => {
                const input = document.getElementById('prompt');
                const val = input.value.trim();
                if(!val) return;
                input.value = '';

                let chat = data.find(x => x.id === activeId);
                if(chat.msgs.length === 0) chat.name = val.substring(0, 20);

                chat.msgs.push({r: 'user', c: val});
                draw('user', val);

                const isVisual = val.toLowerCase().match(/(imagem|foto|desenhe|crie)/i);
                if(isVisual) {
                    const url = `https://pollinations.ai/p/${encodeURIComponent(val)}?width=1024&height=1024&seed=${Math.random()}&nologo=true`;
                    chat.msgs.push({r: 'ai', c: url, i: true});
                    draw('ai', url, true);
                } else {
                    try {
                        const response = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent(val)}`);
                        const text = await response.text();
                        chat.msgs.push({r: 'ai', c: text});
                        draw('ai', text);
                    } catch { draw('ai', 'Falha na conexão com o servidor.'); }
                }
                save();
            };

            return {
                newChat: () => {
                    const id = 'ID' + Date.now();
                    data.unshift({id, name: 'Nova Conversa', msgs: []});
                    activeId = id;
                    loadChat(id);
                },
                send,
                scroll,
                init: () => {
                    if(!data.length) Core.newChat();
                    else loadChat(activeId || data[0].id);
                    document.getElementById('prompt').onkeypress = e => e.key === 'Enter' && send();
                },
                deleteChat: () => {
                    data = data.filter(x => x.id !== activeId);
                    save();
                    location.reload();
                }
            };
        })();

        Core.init();
    </script>
</body>
</html>
