<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL OS | ENGINE X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        /* Balões de Mensagem Estilo Premium */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; }
        .user { background: #2563eb; color: white; align-self: flex-end; }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; width: 100%; }
        
        /* Renderização de Markdown (Fim dos asteriscos) */
        .ai strong { color: #fff; font-weight: 800; }
        .ai code { background: #222; padding: 3px 6px; border-radius: 5px; color: #60a5fa; font-family: monospace; }
        .ai pre { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; overflow-x: auto; margin: 10px 0; }
        .ai p { margin-bottom: 10px; }

        /* Input Fixado */
        .footer { padding: 20px; background: #050505; border-top: 1px solid #1a1a1a; }
        .input-box { background: #111; border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; padding: 5px 15px; max-width: 900px; margin: 0 auto; }
        input { background: transparent; border: none; outline: none; color: #fff; flex: 1; padding: 10px; }
        
        .t-item { padding: 10px; border-radius: 8px; cursor: pointer; color: #71717a; transition: 0.2s; font-size: 13px; margin: 2px 15px; }
        .t-item:hover { background: #111; color: #fff; }
        .t-item.active { background: #1a1a1a; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="p-6 text-center">
            <h1 class="font-black text-blue-500 tracking-tighter text-xl mb-6">GABRIEL OS</h1>
            <button onclick="Engine.newChat()" class="w-full py-2.5 bg-white text-black font-bold rounded-lg text-xs hover:bg-blue-600 hover:text-white transition uppercase">Novo Tópico</button>
        </div>
        <nav id="topic-list" class="flex-1 overflow-y-auto"></nav>
    </aside>

    <main class="main">
        <div id="chat-view"></div>
        <footer class="footer">
            <div class="input-box">
                <input id="prompt" type="text" placeholder="Escreva como eu faria..." autocomplete="off">
                <button onclick="Engine.send()" class="text-blue-500 hover:text-white p-2"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </main>

    <script>
        const Engine = (() => {
            let db = JSON.parse(localStorage.getItem('gabriel_vX')) || [];
            let activeId = localStorage.getItem('gabriel_vX_id');

            const save = () => {
                localStorage.setItem('gabriel_vX', JSON.stringify(db));
                localStorage.setItem('gabriel_vX_id', activeId);
                renderTopics();
            };

            const renderTopics = () => {
                const list = document.getElementById('topic-list');
                list.innerHTML = '';
                db.forEach(t => {
                    const d = document.createElement('div');
                    d.className = `t-item ${t.id === activeId ? 'active' : ''}`;
                    d.innerText = t.name;
                    d.onclick = () => loadChat(t.id);
                    list.appendChild(d);
                });
            };

            const loadChat = (id) => {
                activeId = id;
                const chat = db.find(x => x.id === id);
                const view = document.getElementById('chat-view');
                view.innerHTML = '';
                if(chat) chat.msgs.forEach(m => draw(m.role, m.text, m.img));
                save();
            };

            const draw = (role, text, isImg) => {
                const div = document.createElement('div');
                div.className = `msg ${role}`;
                if(isImg) {
                    div.innerHTML = `<img src="${text}" class="w-full rounded-lg" onload="document.getElementById('chat-view').scrollTop = 999999">`;
                } else {
                    div.innerHTML = marked.parse(text); // Transforma Markdown em texto limpo
                }
                document.getElementById('chat-view').appendChild(div);
                document.getElementById('chat-view').scrollTop = 999999;
            };

            const send = async () => {
                const input = document.getElementById('prompt');
                const val = input.value.trim();
                if(!val) return;
                input.value = '';

                let chat = db.find(x => x.
