<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racer - Desvie!</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { background: #333; border: 4px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: block; }
        .info { margin-top: 10px; text-align: center; }
        .score { font-size: 24px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="info">
        <div class="score">Pontos: <span id="pontos">0</span></div>
        <p>Use as setas <b>ESQUERDA</b> e <b>DIREITA</b> para desviar!</p>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pontosEl = document.getElementById("pontos");

        // Configurações do Jogador
        const player = { x: 175, y: 500, w: 50, h: 80, speed: 5, color: "#2563eb" };
        let inimigos = [];
        let score = 0;
        let gameActive = true;
        let frameCount = 0;

        // Teclado
        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function criarInimigo() {
            const lane = Math.floor(Math.random() * 3); // 3 faixas
            const xPos = [50, 175, 300][lane];
            inimigos.push({ x: xPos, y: -100, w: 50, h: 80, speed: 4 + (score / 5) });
        }

        function desenharCarro(x, y, color) {
            // Corpo do carro
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 50, 80);
            // Rodas
            ctx.fillStyle = "#000";
            ctx.fillRect(x - 5, y + 10, 10, 20); // lateral esquerda sup
            ctx.fillRect(x + 45, y + 10, 10, 20); // lateral direita sup
            ctx.fillRect(x - 5, y + 50, 10, 20); // lateral esquerda inf
            ctx.fillRect(x + 45, y + 50, 10, 20); // lateral direita inf
            // Vidro
            ctx.fillStyle = "#add8e6";
            ctx.fillRect(x + 5, y + 15, 40, 20);
        }

        function update() {
            if (!gameActive) return;

            // Movimento do jogador
            if (keys["ArrowLeft"] && player.x > 10) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.w - 10) player.x += player.speed;

            // Criar inimigos a cada 80 frames
            if (frameCount % 80 === 0) criarInimigo();

            // Mover inimigos
            inimigos.forEach((ini, index) => {
                ini.y += ini.speed;

                // Colisão
                if (player.x < ini.x + ini.w && player.x + player.w > ini.x &&
                    player.y < ini.y + ini.h && player.y + player.h > ini.y) {
                    gameActive = false;
                    alert("GAME OVER! Pontuação: " + score);
                    location.reload();
                }

                // Remove inimigos que passaram e ganha ponto
                if (ini.y > canvas.height) {
                    inimigos.splice(index, 1);
                    score++;
                    pontosEl.innerText = score;
                }
            });

            frameCount++;
        }

        function draw() {
            // Limpar tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Estrada (Linhas)
            ctx.strokeStyle = "#fff";
            ctx.setLineDash([20, 20]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(133, 0); ctx.lineTo(133, canvas.height);
            ctx.moveTo(266, 0); ctx.lineTo(266, canvas.height);
            ctx.stroke();

            // Desenhar Jogador
            desenharCarro(player.x, player.y, player.color);

            // Desenhar Inimigos
            inimigos.forEach(ini => desenharCarro(ini.x, ini.y, "#ef4444"));

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
