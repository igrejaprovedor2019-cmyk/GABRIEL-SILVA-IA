<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Silva | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030303;
            color: #ffffff;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-sidebar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-container {
            background: radial-gradient(circle at 50% 0%, #111827 0%, #030303 100%);
        }

        .msg-ai {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0px 20px 20px 20px;
        }

        .msg-user {
            background: #2563eb;
            border-radius: 20px 20px 0px 20px;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .input-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex">

    <aside class="glass-sidebar w-72 hidden md:flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/30">
                <i class="fas fa-bolt text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-sm tracking-tight text-white">GABRIEL SILVA</h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Enterprise v6.0</p>
            </div>
        </div>

        <button onclick="location.reload()" class="w-full py-3 px-4 bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl text-xs font-bold transition flex items-center justify-center gap-2 mb-8">
            <i class="fas fa-plus"></i> NOVO CHAT
        </button>

        <nav class="flex-1 space-y-2 overflow-y-auto custom-scroll">
            <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Recentes</div>
            <div id="history" class="space-y-1"></div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col chat-container relative">
        
        <header class="h-16 px-8 flex items-center justify-between border-b border-white/5 bg-black/20">
            <div class="flex items-center gap-4">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Motor de IA Operacional</span>
            </div>
            <div class="flex items-center gap-6 text-zinc-500">
                <i class="fas fa-shield-check hover:text-white transition cursor-pointer"></i>
                <i class="fas fa-gear hover:text-white transition cursor-pointer"></i>
            </div>
        </header>

        <div id="viewport" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 custom-scroll pb-32">
            <div class="max-w-3xl mx-auto text-center py-10" id="welcome">
                <h2 class="text-4xl font-extrabold mb-4">O que vamos construir?</h2>
                <p class="text-zinc-500 text-sm">Sistema otimizado para Gabriel Silva. Gere imagens ou códigos agora.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/80 to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div class="input-pill flex items-center px-6 py-4 shadow-2xl">
                    <input id="prompt" type="text" placeholder="Envie sua ideia..." class="bg-transparent flex-1 outline-none text-sm text-white placeholder-zinc-600">
                    <button id="send-btn" class="ml-4 w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition active:scale-95">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const viewport = document.getElementById('viewport');
        const input = document.getElementById('prompt');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history');
        const welcome = document.getElementById('welcome');

        let isWorking = false;

        function addMessage(role, text, isImage = false) {
            if(welcome) welcome.style.display = 'none';
            
            const div = document.createElement('div');
            div.className = `max-w-3xl mx-auto flex gap-5 animate-fade ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const avatar = role === 'user' ? 'U' : 'GS';
            const bubbleClass = role === 'user' ? 'msg-user' : 'msg-ai';

            let content = isImage 
                ? `<div class="rounded-xl overflow-hidden border border-white/10"><img src="${text}" class="w-full h-auto block" onload="viewport.scrollTop = viewport.scrollHeight"><div class="p-3 bg-zinc-900 text-[10px] font-bold text-blue-500 flex justify-between"><span>RENDER FLUX V2</span><a href="${text}" target="_blank">BAIXAR</a></div></div>`
                : `<p class="text-sm leading-relaxed">${text.replace(/\n/g, '<br>')}</p>`;

            div.innerHTML = `
                <div class="w-9 h-9 rounded-lg flex-shrink-0 flex items-center justify-center font-bold text-[10px] ${role === 'user' ? 'bg-zinc-800' : 'bg-blue-600'}">${avatar}</div>
                <div class="${bubbleClass} p-5 max-w-[85%] shadow-xl">
                    ${content}
                </div>
            `;
            
            viewport.appendChild(div);
            viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
        }

        async function process() {
            const val = input.value.trim();
            if(!val || isWorking) return;

            isWorking = true;
            input.value = '';
            addMessage('user', val);

            // Adicionar ao histórico lateral
            const hItem = document.createElement('div');
            hItem.className = 'p-3 text-[11px] text-zinc-500 truncate hover:bg-white/5 rounded-lg cursor-pointer';
            hItem.innerText = val;
            historyList.prepend(hItem);

            const isImg = val.toLowerCase().match(/(imagem|foto|desenhe|crie|render)/i);

            if(isImg) {
                addMessage('ai', "Iniciando renderização de imagem de alta definição...");
                const seed = Math.floor(Math.random() * 999999);
                const url = `https://pollinations.ai/p/${encodeURIComponent(val)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
                
                const img = new Image();
                img.src = url;
                img.onload = () => {
                    viewport.lastChild.remove();
                    addMessage('ai', url, true);
                    isWorking = false;
                };
            } else {
                try {
                    const res = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent("Responda de forma profissional como a IA do Gabriel Silva: " + val)}`);
                    const txt = await res.text();
                    addMessage('ai', txt);
                } catch(e) {
                    addMessage('ai', "Ocorreu um erro de comunicação. Tente novamente.");
                }
                isWorking = false;
            }
        }

        sendBtn.addEventListener('click', process);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') process(); });
    </script>
</body>
</html>
