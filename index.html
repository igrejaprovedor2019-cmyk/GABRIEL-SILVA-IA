<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL SILVA | ENTERPRISE V14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020202; color: #fff; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .sidebar { width: 260px; background: #080808; border-right: 1px solid #151515; display: flex; flex-direction: column; flex-shrink: 0; }
        #view { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; background: #000; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 14px; animation: in 0.2s ease; line-height: 1.5; }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; }
        .user { background: #2563eb; align-self: flex-end; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .t-btn { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #666; transition: 0.2s; border-left: 2px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-btn.active { background: #111; color: #fff; border-left-color: #2563eb; }
        input::placeholder { color: #444; }
        @keyframes in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <aside class="sidebar p-4">
        <h1 class="font-bold text-xs tracking-widest text-blue-500 mb-6 uppercase">Gabriel Silva AI</h1>
        <button onclick="Core.new()" class="w-full py-3 bg-white text-black rounded-xl text-[10px] font-black mb-4 hover:bg-blue-600 hover:text-white transition uppercase shadow-lg">+ Novo Tópico</button>
        <div id="topics" class="flex-1 overflow-y-auto space-y-1 pr-2"></div>
        <div class="text-[9px] text-zinc-600 border-t border-zinc-900 pt-4 uppercase tracking-widest font-bold">Admin Mode v14.0</div>
    </aside>
    <main class="flex-1 flex flex-col relative">
        <header class="h-14 border-b border-zinc-900 flex items-center px-6 text-[10px] font-bold text-zinc-500 uppercase tracking-widest bg-black/50 backdrop-blur-md">Sistema Operacional Online</header>
        <div id="view"></div>
        <div class="p-6 bg-gradient-to-t from-black via-black to-transparent">
            <div class="max-w-4xl mx-auto flex gap-3 bg-zinc-900 p-2 rounded-2xl border border-zinc-800 shadow-2xl">
                <input id="in" type="text" placeholder="Escreva sua mensagem ou peça uma imagem..." class="bg-transparent flex-1 p-3 outline-none text-sm text-white">
                <button onclick="Core.send()" class="bg-blue-600 w-12 h-12 rounded-xl hover:bg-blue-500 transition active:scale-90 flex items-center justify-center shadow-lg shadow-blue-600/20"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </main>
    <script>
        const Core = (() => {
            let db = JSON.parse(localStorage.getItem('gs_v14')) || [], cur = localStorage.getItem('gs_id_v14');
            const save = () => { localStorage.setItem('gs_v14', JSON.stringify(db)); localStorage.setItem('gs_id_v14', cur); render(); };
            const render = () => {
                const nav = document.getElementById('topics'); nav.innerHTML = '';
                db.forEach(t => { const d = document.createElement('div'); d.className = `t-btn ${t.id === cur ? 'active' : ''}`; d.innerText = t.name; d.onclick = () => load(t.id); nav.appendChild(d); });
            };
            const load = (id) => {
                cur = id; const v = document.getElementById('view'); v.innerHTML = '';
                const chat = db.find(x => x.id === id); if(!chat) return Core.new();
                chat.msgs.forEach(m => draw(m.r, m.c, m.i)); render();
            };
            const draw = (r, c, i) => {
                const d = document.createElement('div'); d.className = `msg ${r}`;
                if(i) d.innerHTML = `<img src="${c}" class="w-full rounded-lg shadow-2xl border border-white/5" onload="document.getElementById('view').scrollTop = 999999">`;
                else d.innerText = c;
                document.getElementById('view').appendChild(d); document.getElementById('view').scrollTop = 999999;
            };
            const send = async () => {
                const i = document.getElementById('in'), v = i.value.
