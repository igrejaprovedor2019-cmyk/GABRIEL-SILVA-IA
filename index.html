<!DOCTYPE html>

        body, html { height: 100%; margin: 0; background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .sidebar { width: 300px; background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }

        .topic-link { padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; margin-bottom: 8px; font-size: 13px; color: #71717a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .topic-link:hover { background: #161616; color: #fff; }
        .topic-link.active { background: #1e1e1e; border-color: #333; color: #fff; font-weight: 600; }
        .input-box { background: #0f0f0f; border: 1px solid #222; border-radius: 16px; padding: 12px 18px; width: 100%; max-width: 800px; margin: 0 auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
