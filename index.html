<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL SILVA / IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #f1f5f9; margin: 0; }
        .sidebar { background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); }
        .chat-container { background: #0b0e14; }
        .ai-bubble { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        .user-bubble { background: #3b82f6; }
        .glass-header { background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .input-area { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        /* Scrollbar estilizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex">

    <aside class="sidebar w-64 hidden lg:flex flex-col p-6 flex-shrink-0">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white shadow-lg">GS</div>
            <span class="font-semibold tracking-tight text-white">GABRIEL SILVA</span>
        </div>
        
        <nav class="flex-1 space-y-2">
            <div class="flex items-center gap-3 p-3 rounded-lg bg-blue-600/10 text-blue-400 font-medium cursor-pointer">
                <i class="fas fa-message"></i> Chat Principal
            </div>
            <div class="flex items-center gap-3 p-3 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition cursor-pointer">
                <i class="fas fa-wand-magic-sparkles"></i> Gerador de Imagem
            </div>
            <div class="flex items-center gap-3 p-3 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition cursor-pointer">
                <i class="fas fa-clock-rotate-left"></i> Histórico
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex items-center gap-3 text-xs text-gray-500 font-medium uppercase tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span> Sistema Ativo
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        
        <header class="glass-header p-4 flex justify-between items-center px-8 z-20">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Gabriel Silva / IA - v2.0</h2>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="text-gray-500 hover:text-white transition"><i class="fas fa-rotate-right"></i></button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 scroller pb-32">
            <div class="flex gap-5 max-w-4xl mx-auto">
                <div class="w-9 h-9 bg-blue-600 rounded flex-shrink-0 flex items-center justify-center font-bold text-xs">GS</div>
                <div class="ai-bubble p-5 rounded-2xl rounded-tl-none shadow-sm text-sm leading-relaxed max-w-[85%]">
                    Olá. Sou o <b>Gabriel Silva / IA</b>. Como posso auxiliar você hoje? Estou pronto para gerar códigos, responder dúvidas ou criar imagens de alta qualidade.
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-4 md:p-10 bg-gradient-to-t from-[#0b0e14] via-[#0b0e14] to-transparent">
            <div class="max-w-4xl mx-auto flex items-center relative">
                <input id="input" type="text" placeholder="Digite sua mensagem aqui..." 
                    class="w-full input-area p-4 pr-16 rounded-xl text-sm outline-none focus:border-blue-500 transition-all text-white placeholder-gray-500 shadow-2xl">
                <button onclick="handleSend()" class="absolute right-3 bg-blue-600 hover:bg-blue-700 w-10 h-10 rounded-lg flex items-center justify-center transition-all active:scale-95">
                    <i class="fas fa-arrow-up text-white text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('input');

        function appendMessage(role, content, isImage = false) {
            const div = document.createElement('div');
            div.className = role === 'user' ? "flex gap-5 flex-row-reverse max-w-4xl mx-auto" : "flex gap-5 max-w-4xl mx-auto";
            
            const icon = role === 'user' ? '<i class="fas fa-user"></i>' : 'GS';
            const bubbleClass = role === 'user' ? "user-bubble text-white" : "ai-bubble text-gray-200";

            const messageHtml = isImage 
                ? `<div class="space-y-3"><p class="text-xs text-blue-400 font-medium">Processamento de imagem concluído:</p><img src="${content}" class="rounded-lg w-full border border-white/10 shadow-2xl" onload="chatContainer.scrollTop = chatContainer.scrollHeight;"></div>`
                : `<p class="leading-relaxed text-sm">${content}</p>`;

            div.innerHTML = `
                <div class="w-9 h-9 ${role === 'user' ? 'bg-slate-700' : 'bg-blue-600'} rounded flex-shrink-0 flex items-center justify-center text-[10px] font-bold shadow-md">${icon}</div>
                <div class="${bubbleClass} p-5 rounded-2xl ${role === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} max-w-[85%] shadow-lg">
                    ${messageHtml}
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const prompt = input.value.trim();
            if (!prompt) return;

            appendMessage('user', prompt);
            input.value = '';

            const promptLower = prompt.toLowerCase();
            const isImage = promptLower.includes('imagem') || promptLower.includes('desenhe') || promptLower.includes('crie');

            if (isImage) {
                const seed = Math.floor(Math.random() * 999999);
                const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
                
                // Mostra que está carregando de forma profissional
                const loadingDiv = document.createElement('div');
                loadingDiv.className = "flex gap-5 max-w-4xl mx-auto opacity-50";
                loadingDiv.innerHTML = `<div class="w-9 h-9 bg-blue-600 rounded flex items-center justify-center font-bold text-xs">GS</div><div class="ai-bubble p-5 rounded-2xl text-sm italic">Gerando conteúdo visual...</div>`;
                chatContainer.appendChild(loadingDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                const img = new Image();
                img.src = imageUrl;
                img.onload = () => {
                    chatContainer.removeChild(loadingDiv);
                    appendMessage('ai', imageUrl, true);
                };
            } else {
                try {
                    // PROMPT DE SISTEMA PROFISSIONAL (Estilo ChatGPT)
                    const system = "Você é o GABRIEL SILVA / IA, um assistente virtual de elite. Responda de forma profissional, educada e clara. Use um português correto. Seja útil e objetivo como o ChatGPT.";
                    const response = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent(system + " Usuário: " + prompt)}`);
                    const data = await response.text();
                    appendMessage('ai', data);
                } catch (e) {
                    appendMessage('ai', "Peço desculpas, mas houve um erro na conexão com meus servidores. Poderia repetir a solicitação?");
                }
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
