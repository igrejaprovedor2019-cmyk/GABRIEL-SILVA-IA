<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL SILVA | OS v11 ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #030303; --panel: #0a0a0a; --accent: #2563eb; --border: #1a1a1a; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #viewport { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 1.2rem; border-radius: 20px; font-size: 14px; line-height: 1.6; animation: fadeInUp 0.3s ease forwards; }
        .ai { background: #111; border: 1px solid var(--border); align-self: flex-start; }
        .user { background: var(--accent); align-self: flex-end; box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.4); }
        .topic-btn { padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 13px; color: #71717a; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .topic-btn:hover { background: #161616; color: #fff; }
        .topic-btn.active { background: #1e1e1e; color: #fff; border-left: 3px solid var(--accent); }
        .input-area { background: #0f0f0f; border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        input { background: transparent; flex: 1; outline: none; border: none; color: #fff; font-size: 14px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-xl shadow-blue-600/30"><i class="fas fa-bolt"></i></div>
                <h1 class="font-extrabold text-sm tracking-tight text-white uppercase">Gabriel Silva</h1>
            </div>
            <button onclick="System.newChat()" class="w-full py-3 bg-white text-black rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition uppercase tracking-tighter shadow-lg">+ Novo Tópico</button>
        </div>
        <nav id="topics" class="flex-1 overflow-y-auto px-4"></nav>
        <div class="p-6 border-t border-zinc-900"><div class="flex items-center gap-3 text-zinc-500 text-[10px] font-bold uppercase tracking-widest"><i class="fas fa-user-shield"></i> Admin Mode Active</div></div>
    </aside>

    <main class="main-content">
        <header class="h-16 border-b border-zinc-900 flex items-center justify-between px-8 bg-black/40 backdrop-blur-md">
            <div class="flex items-center gap-3"><div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div><span id="chat-title" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Aguardando Comando</span></div>
            <button onclick="System.clear()" class="text-zinc-700 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
        </header>

        <div id="viewport"></div>

        <footer class="p-8 bg-gradient-to-t from-black via-black/90 to-transparent">
            <div class="max-w-4xl mx-auto input-area shadow-2xl">
                <input id="query" type="text" placeholder="Envie sua ideia agora..." autocomplete="off">
                <button onclick="System.handle()" class="w-10 h-10 bg-blue-600 hover:bg-blue-500 rounded-xl flex items-center justify-center transition active:scale-90 shadow-lg shadow-blue-600/20"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </footer>
    </main>

    <script>
        const System = (() => {
            let db = JSON.parse(localStorage.getItem('gs_elite_v11')) || [];
            let activeId = localStorage.getItem('gs_active_v11') || null;

            const init = () => {
                if (db.length === 0) newChat();
                else { renderTopics(); loadChat(activeId || db[0].id); }
                document.getElementById('query').addEventListener('keypress', (e) => { if(e.key === 'Enter') handle(); });
            };

            const newChat = () => {
                const chat = { id: 'ID_' + Date.now(), name: 'Conversa Nova', msgs: [] };
                db.unshift(chat);
                save(); loadChat(chat.id);
            };

            const loadChat = (id) => {
                activeId = id;
                localStorage.setItem('gs_active_v11', id);
                const chat = db.find(x => x.id === id);
                document.getElementById('viewport').innerHTML = '';
                document.getElementById('chat-title').innerText = chat.name;
                chat.msgs.forEach(m => draw(m.r, m.c, m.t === 'img'));
                renderTopics(); scroll();
            };

            const draw = (role, content, isImg = false) => {
                const d = document.createElement('div');
                d.className = `msg ${role}`;
                if(isImg) {
                    d.innerHTML = `<img src="${content}" class="w-full rounded-lg shadow-2xl border border-white/5" onerror="this.src='https://via.placeholder.com/800?text=Erro+ao+Gerar+Imagem'" onload="System.scroll()">`;
                } else {
                    d.innerText = content;
                }
                document.getElementById('viewport').appendChild(d);
                scroll();
            };

            const handle = async () => {
                const el = document.getElementById('query');
                const val = el.value.trim();
                if(!val) return;
                el.value = '';

                const chat = db.find(x => x.id === activeId);
                if(chat.msgs.length === 0) chat.name = val.substring(0, 22) + "...";
                
                chat.msgs.push({ r: 'user', c: val });
                draw('user', val);
                save();

                const isImg = val.toLowerCase().match(/(imagem|foto|desenhe|c
