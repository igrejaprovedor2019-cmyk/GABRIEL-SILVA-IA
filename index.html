    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-ultra-dark: #050507;
            --bg-panel: #0a0a0c;
            --border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-ultra-dark);
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- LAYOUT ARCHITECTURE --- */
        
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-ultra-dark) 60%);
        }

        /* --- CHAT VIEWPORT --- */

        .viewport {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .message-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 1.5rem;
            animation: fadeInMsg 0.5s ease-out forwards;
        }

        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .ai-avatar {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 0 15px var(--primary-glow);
        }
