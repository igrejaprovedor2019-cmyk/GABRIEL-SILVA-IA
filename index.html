<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL OS | V22 INDUSTRIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; display: flex; }
        .sidebar { width: 260px; background: #050505; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        #chat-view { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 85%; padding: 14px; border-radius: 12px; font-size: 15px; line-height: 1.6; }
        .user { background: #2563eb; align-self: flex-end; color: white; }
        .ai { background: #111; border: 1px solid #222; align-self: flex-start; width: 100%; }
        
        /* Formatação de texto real */
        .ai strong { color: #fff; font-weight: bold; }
        .ai code { background: #222; padding: 2px 5px; border-radius: 4px; color: #60a5fa; }
        .ai pre { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; margin: 10px 0; }

        .footer { padding: 20px; background: #0a0a0a; }
        .input-box { background: #111; border: 1px solid #333; border-radius: 12px; display: flex; padding: 5px 15px; max-width: 800px; margin: 0 auto; }
        input { background: transparent; border: none; outline: none; color: #fff; flex: 1; padding: 10px; }
        
        .t-btn { padding: 12px; margin: 2px 15px; border-radius: 8px; cursor: pointer; color: #666; font-size: 13px; transition: 0.2s; }
        .t-btn:hover { background: #111; color: #fff; }
        .t-btn.active { background: #1a1a1a; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6">
            <h1 class="text-blue-600 font-black text-xl mb-6 tracking-tighter">GABRIEL OS</h1>
            <button onclick="newChat()" class="w-full py-2 bg-white text-black font-bold rounded-lg text-xs hover:bg-blue-600 hover:text-white transition">NOVO TÓPICO</button>
        </div>
        <div id="topic-list" class="flex-1 overflow-y-auto"></div>
    </div>

    <div class="main">
        <div id="chat-view"></div>
        <div class="footer">
            <div class="input-box">
                <input id="prompt" type="text" placeholder="Digite agora e veja funcionar..." onkeypress="checkKey(event)">
